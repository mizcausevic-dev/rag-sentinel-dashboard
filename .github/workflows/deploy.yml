name: Build and Deploy to Hostinger

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    name: Build dist/ and FTP-sync to rag.kineticgain.com
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build production bundle
        run: npm run build

      - name: Verify dist/ contains RAG Sentinel
        run: |
          test -f dist/index.html || (echo "FAIL: no dist/index.html" && exit 1)
          grep -q "RAG Sentinel" dist/index.html || (echo "FAIL: dist/index.html does not contain RAG Sentinel" && exit 1)
          echo "OK: dist/ verified"
          ls -lah dist/

      - name: FTP-Deploy dist/ to /rag/
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_HOST }}
          username: ${{ secrets.FTP_USER }}
          password: ${{ secrets.FTP_PASS }}
          protocol: ftps
          port: 21
          local-dir: ./dist/
          server-dir: /rag/
          dangerous-clean-slate: false
          log-level: standard
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**
            **/.DS_Store
